name: Build Android APK

on:
  push:
    branches: [ "main", "master" ] # Triggers whenever you push code
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run this build manually from the GitHub website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the source code from your repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Install Java Development Kit (JDK) 17 required by modern Android Gradle
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # Caches dependencies so future builds run much faster

      # Step 3: Fix Exit Code 127 by forcing Linux execution permissions on the Gradle wrapper
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # Step 4: Run the compiler to build the debug APK file
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # Step 5: Save and upload the compiled APK file so you can download it
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          
