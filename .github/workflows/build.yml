name: Build Flutter Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download code cleanly
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Initialize Java using the latest runtime bindings
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Setup Flutter (Uses specific action versioning)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Step 4: Force pull packages ignoring local cache locks
      - name: Install Dependencies
        run: flutter pub get

      # Step 5: Compile with Verbose Diagnostic Logging
      - name: Build Android APK (Diagnostic Mode)
        run: flutter build apk --release -v

      # Step 6: Attempt emergency artifact gathering
      - name: Upload APK Artifact
        if: always() # Runs even if the compilation step cracks
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
