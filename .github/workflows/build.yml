name: Build Flutter Android APK

on:
  push:
    branches: [ "master", "main" ] # Fits your master branch setup
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your Flutter source code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Install Java Development Kit required for compilation
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Install the Flutter framework environment 
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Pulls the current stable build engine
          cache: true       # Speeds up your next builds

      # Step 4: Download the specific Flutter package dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Step 5: Build the final release version of the APK
      - name: Build Android APK
        run: flutter build apk --release

      # Step 6: Collect and save your completed application package
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
