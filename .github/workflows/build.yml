name: Build Flutter Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

# This forces every Flutter setup command to execute directly within your code repository folder
defaults:
  run:
    working-directory: hlbmerge_flutter

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your Flutter source code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Install Java Development Kit required for compilation
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Install the Flutter framework environment 
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Step 4: Wipe out stale structural caches that throw Exit Code 1
      - name: Clean Project Cache
        run: flutter clean

      # Step 5: Download and map local project dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Step 6: Build the final release version of the APK
      - name: Build Android APK
        run: flutter build apk --release

      # Step 7: Collect and save your completed application package
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          # Traces the precise absolute path through the runner workspace
          path: ${{ github.workspace }}/hlbmerge_flutter/build/app/outputs/flutter-apk/app-release.apk
          
